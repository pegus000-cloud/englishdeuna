workflows:
  englishdeuna-android:
    name: EnglishDeUna Android
    max_build_duration: 120
    instance_type: linux_x2
    environment:
      android_signing:
        - englishdeuna_keystore
      vars:
        PACKAGE_NAME: "co.englishdeuna.mobile"
    scripts:
      - name: Install dependencies
        script: npm ci
      - name: Sync Capacitor
        script: npx cap sync android
      - name: Build Android App Bundle
        script: |
          cd android
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/**/*.aab
      - android/app/build/outputs/**/mapping.txt

  englishdeuna-ios:
    name: EnglishDeUna iOS
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: englishdeuna_appstore
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: co.englishdeuna.mobile
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        APP_STORE_APPLE_ID: ""
    scripts:
      - name: Install dependencies
        script: npm ci
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install
      - name: Set up code signing settings
        script: xcode-project use-profiles
      - name: Increment build number
        script: |
          cd $CM_BUILD_DIR/ios/App
          if [ -n "$APP_STORE_APPLE_ID" ]; then
            LATEST_BUILD_NUMBER=$(app-store-connect get-latest-app-store-build-number "$APP_STORE_APPLE_ID")
            if [ -n "$LATEST_BUILD_NUMBER" ]; then
              agvtool new-version -all $(($LATEST_BUILD_NUMBER + 1))
            else
              agvtool new-version -all $BUILD_NUMBER
            fi
          else
            agvtool new-version -all $BUILD_NUMBER
          fi
      - name: Build IPA
        script: |
          cd $CM_BUILD_DIR/ios/App
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        expire_build_submitted_for_review: true
