workflows:
  englishdeuna-android:
    name: EnglishDeUna Android
    max_build_duration: 120
    instance_type: linux_x2
    environment:
      android_signing:
        - englishdeuna_keystore
      vars:
        PACKAGE_NAME: "co.englishdeuna.mobile"
    scripts:
      - name: Install dependencies
        script: npm ci
      - name: Sync Capacitor
        script: npx cap sync android
      - name: Build Android App Bundle
        script: |
          cd android
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/**/*.aab
      - android/app/build/outputs/**/mapping.txt

  englishdeuna-ios:
    name: EnglishDeUna iOS
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: englishdeuna_appstore
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: co.englishdeuna.mobile
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
    scripts:
      - name: Install dependencies
        script: npm ci
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Set up code signing settings
        script: |
          xcode-project use-profiles \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            --custom-export-options='{"testFlightInternalTestingOnly": true}'
      - name: Increment build number
        script: |
          cd $CM_BUILD_DIR/ios/App
          agvtool new-version -all $BUILD_NUMBER
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      app_store_connect:
        auth: integration
        beta_groups:
          - Internal Testers
